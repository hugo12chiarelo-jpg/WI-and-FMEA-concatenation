name: FMEA Coverage Analysis

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          if [ -z "$API_KEY_DS" ]; then
            echo "::error::Required secret API_KEY_DS is not set. Go to Settings → Secrets and variables → Actions and add your DeepSeek API key as a secret named API_KEY_DS."
            exit 1
          fi
        env:
          API_KEY_DS: ${{ secrets.API_KEY_DS }}

      - name: Run FMEA analysis with DeepSeek Reasoner
        env:
          API_KEY_DS: ${{ secrets.API_KEY_DS }}
        run: python scripts/analyze_fmea.py

      - name: Upload analysis result
        uses: actions/upload-artifact@v4
        with:
          name: fmea-coverage-report
          path: results/analysis.xlsx
